services:
  postgres:
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init-scripts:/docker-entrypoint-initdb.d

  redis:
    ports:
      - "6379:6379"

  zookeeper:
    ports:
      - "2181:2181"

  kafka:
    ports:
      - "9092:9092"
    environment:
      # Override to include both internal (for docker services) and external (for local dev) listeners
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

  eureka-server:
    ports:
      - "8761:8761"

  api-gateway:
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: ./j-ledger-portal/apps/auth-service
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://ledger_admin:ledger_password@postgres:5432/auth_db
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REGISTRATION_SECRET: ${JWT_REGISTRATION_SECRET}
      JLEDGER_REDIS_ADDRESS: redis://redis:6379
      PORT: 3003
    depends_on:
      - postgres
      - redis
    networks:
      - jledger-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: jledger-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jledger.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    networks:
      - jledger-network
    depends_on:
      - postgres

  nginx:
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
