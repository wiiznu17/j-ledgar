services:
  # ----------------------------------------------------
  # 1. PostgreSQL - Primary Database
  # ----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: jledger-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledger_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-jledger_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ledger_admin} -d ${POSTGRES_DB:-jledger_db}",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 2. Redis - In-Memory Cache
  # ----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jledger-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 3. Zookeeper
  # ----------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: jledger-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 4. Apache Kafka
  # ----------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: jledger-kafka
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 5. Eureka Server (Service Registry)
  # ----------------------------------------------------
  eureka-server:
    build:
      context: ./j-ledger-core/eureka-server
    image: j-ledger/eureka-server:latest
    container_name: jledger-eureka
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8761/",
        ]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 6. API Gateway
  # ----------------------------------------------------
  api-gateway:
    build:
      context: ./j-ledger-core/api-gateway
    image: j-ledger/api-gateway:latest
    container_name: jledger-gateway
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - JLEDGER_EUREKA_ZONE=http://eureka-server:8761/eureka/
      - JLEDGER_INTERNAL_SECRET=${JLEDGER_INTERNAL_SECRET}
    networks:
      - jledger-network
    expose:
      - "8080"

  # ----------------------------------------------------
  # 7. Database Migrations (Pre-startup)
  # ----------------------------------------------------
  core-migration:
    image: flyway/flyway:10-alpine
    container_name: jledger-core-migration
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./j-ledger-core/core-service/src/main/resources/db/migration:/flyway/sql
    command: -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-jledger_db} -user=${POSTGRES_USER:-ledger_admin} -password=${POSTGRES_PASSWORD} -connectRetries=60 migrate
    networks:
      - jledger-network

  admin-migration:
    build:
      context: ./j-ledger-portal
      dockerfile: apps/admin-api/Dockerfile
    image: j-ledger/admin-api:latest
    container_name: jledger-admin-migration
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/prisma/seed.js"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledger_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jledger_db}?schema=admin_schema
    networks:
      - jledger-network

  wallet-migration:
    build:
      context: ./j-ledger-portal
      dockerfile: apps/wallet-api/Dockerfile
    image: j-ledger/wallet-api:latest
    container_name: jledger-wallet-migration
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/prisma/seed.js"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledger_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jledger_db}?schema=wallet_schema
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 8. Core Service
  # ----------------------------------------------------
  core-service:
    build:
      context: ./j-ledger-core/core-service
    image: j-ledger/core-service:latest
    container_name: jledger-core
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      core-migration:
        condition: service_completed_successfully
    restart: on-failure
    environment:
      - JLEDGER_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-jledger_db}
      - JLEDGER_DATASOURCE_USERNAME=${POSTGRES_USER:-ledger_admin}
      - JLEDGER_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JLEDGER_REDIS_ADDRESS=redis://redis:6379
      - JLEDGER_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JLEDGER_EUREKA_ZONE=http://eureka-server:8761/eureka/
      - JLEDGER_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JLEDGER_INTERNAL_SECRET=${JLEDGER_INTERNAL_SECRET}
      - JLEDGER_ADMIN_EMAIL=${JLEDGER_ADMIN_EMAIL}
      - JLEDGER_ADMIN_PASSWORD=${JLEDGER_ADMIN_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 9. Notification Service
  # ----------------------------------------------------
  notification-service:
    build:
      context: ./j-ledger-core/notification-service
    image: j-ledger/notification-service:latest
    container_name: jledger-notification
    depends_on:
      kafka:
        condition: service_started
      eureka-server:
        condition: service_healthy
    environment:
      - JLEDGER_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JLEDGER_EUREKA_ZONE=http://eureka-server:8761/eureka/
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 10. Admin API (BFF)
  # ----------------------------------------------------
  admin-api:
    build:
      context: ./j-ledger-portal
      dockerfile: apps/admin-api/Dockerfile
    image: j-ledger/admin-api:latest
    container_name: jledger-admin-api
    depends_on:
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_started
      admin-migration:
        condition: service_completed_successfully
    environment:
      - PORT=3001
      - API_GATEWAY_URL=http://api-gateway:8080
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledger_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jledger_db}?schema=admin_schema
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JLEDGER_INTERNAL_SECRET=${JLEDGER_INTERNAL_SECRET}
      - JLEDGER_ADMIN_EMAIL=${JLEDGER_ADMIN_EMAIL}
      - JLEDGER_ADMIN_PASSWORD=${JLEDGER_ADMIN_PASSWORD}
    networks:
      - jledger-network
    expose:
      - "3001"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/api/admin/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------
  # 11. Admin Web (Portal)
  # ----------------------------------------------------
  admin-web:
    build:
      context: ./j-ledger-portal
      dockerfile: apps/admin-web/Dockerfile
    image: j-ledger/admin-web:latest
    container_name: jledger-admin-web
    depends_on:
      - admin-api
    environment:
      - PORT=3000
      - INTERNAL_API_URL=http://admin-api:3001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    networks:
      - jledger-network
    expose:
      - "3000"

  # ----------------------------------------------------
  # 12. Wallet API
  # ----------------------------------------------------
  wallet-api:
    build:
      context: ./j-ledger-portal
      dockerfile: apps/wallet-api/Dockerfile
    image: j-ledger/wallet-api:latest
    container_name: jledger-wallet-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_started
      wallet-migration:
        condition: service_completed_successfully
    environment:
      - PORT=3002
      - API_GATEWAY_URL=http://api-gateway:8080
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ledger_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jledger_db}?schema=wallet_schema
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REGISTRATION_SECRET=${JWT_REGISTRATION_SECRET}
      - JLEDGER_INTERNAL_SECRET=${JLEDGER_INTERNAL_SECRET}
      - JLEDGER_REDIS_ADDRESS=redis://redis:6379
      - JLEDGER_REDIS_PASSWORD=${REDIS_PASSWORD}
      - KYC_ENCRYPTION_KEY=${KYC_ENCRYPTION_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - SMS_PROVIDER_TYPE=${SMS_PROVIDER_TYPE}
      - KYC_OCR_PROVIDER_TYPE=${KYC_OCR_PROVIDER_TYPE}
      - KYC_FACE_PROVIDER_TYPE=${KYC_FACE_PROVIDER_TYPE}
      - STORAGE_PROVIDER_TYPE=${STORAGE_PROVIDER_TYPE}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - THROTTLE_TTL_DEFAULT=${THROTTLE_TTL_DEFAULT:-60000}
      - THROTTLE_LIMIT_DEFAULT=${THROTTLE_LIMIT_DEFAULT:-100}
      - THROTTLE_TTL_REG_INIT=${THROTTLE_TTL_REG_INIT:-300000}
      - THROTTLE_LIMIT_REG_INIT=${THROTTLE_LIMIT_REG_INIT:-10}
      - THROTTLE_TTL_REG_VERIFY=${THROTTLE_TTL_REG_VERIFY:-180000}
      - THROTTLE_LIMIT_REG_VERIFY=${THROTTLE_LIMIT_REG_VERIFY:-10}
      - THROTTLE_TTL_LOGIN=${THROTTLE_TTL_LOGIN:-900000}
      - THROTTLE_LIMIT_LOGIN=${THROTTLE_LIMIT_LOGIN:-10}
    volumes:
      - ./ewallet-ekyc-project-4083c44873a8.json:/app/secrets/google-key.json:ro
    networks:
      - jledger-network
    expose:
      - "3002"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3002/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------
  # 14. Nginx - Unified Entry Point (Reverse Proxy)
  # ----------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: jledger-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf.prod:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api-gateway:
        condition: service_started
      admin-web:
        condition: service_started
      admin-api:
        condition: service_healthy
      wallet-api:
        condition: service_healthy
    networks:
      - jledger-network

volumes:
  pgdata:
  redisdata:

networks:
  jledger-network:
    driver: bridge
