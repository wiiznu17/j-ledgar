server:
  port: 8081

eureka:
  client:
    serviceUrl:
      defaultZone: ${JLEDGER_EUREKA_ZONE:http://localhost:8761/eureka/}
    # Handle race conditions during startup
    healthcheck:
      enabled: true
    retryable: true

spring:
  application:
    name: core-service

  datasource:
    url: ${JLEDGER_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jledger_db}
    username: ${JLEDGER_DATASOURCE_USERNAME:ledger_admin}
    password: ${JLEDGER_DATASOURCE_PASSWORD:ledger_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Connection pool size settings
      maximum-pool-size: ${JLEDGER_DATASOURCE_POOL_SIZE:20}
      minimum-idle: ${JLEDGER_DATASOURCE_MIN_IDLE:5}
      # Connection timeout settings
      connection-timeout: ${JLEDGER_DATASOURCE_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${JLEDGER_DATASOURCE_IDLE_TIMEOUT:600000}
      max-lifetime: ${JLEDGER_DATASOURCE_MAX_LIFETIME:1800000}
      # Performance optimizations
      connection-test-query: SELECT 1
      validation-timeout: ${JLEDGER_DATASOURCE_VALIDATION_TIMEOUT:5000}
      leak-detection-threshold: ${JLEDGER_DATASOURCE_LEAK_DETECTION_THRESHOLD:30000}
      # Pool name for monitoring
      pool-name: JLedgerHikariPool

  jpa:
    open-in-view: false
    show-sql: ${JLEDGER_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate # Use validate in production to rely on Flyway migrations
  flyway:
    enabled: true
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${JLEDGER_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  data:
    redis:
      repositories:
        enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

jledger:
  redis:
    address: ${JLEDGER_REDIS_ADDRESS:redis://localhost:6379}
    password: ${JLEDGER_REDIS_PASSWORD:redis_password}
    idempotency-ttl-hours: ${JLEDGER_REDIS_IDEMPOTENCY_TTL_HOURS:24}
  lock:
    wait-seconds: ${JLEDGER_LOCK_WAIT_SECONDS:3}
    lease-seconds: ${JLEDGER_LOCK_LEASE_SECONDS:10}
  outbox:
    topic: ${JLEDGER_OUTBOX_TOPIC:wallet.transaction.events}
    fixed-delay-ms: ${JLEDGER_OUTBOX_FIXED_DELAY_MS:2000}
    max-retries: ${JLEDGER_OUTBOX_MAX_RETRIES:5}
  admin:
    email: ${JLEDGER_ADMIN_EMAIL:admin@jledger.io}
    password: ${JLEDGER_ADMIN_PASSWORD:password123}
  internal:
    secret: ${JLEDGER_INTERNAL_SECRET}

logging:
  level:
    org.springframework.orm.jpa: ${JLEDGER_JPA_LOG_LEVEL:INFO}
    org.springframework.transaction: ${JLEDGER_TX_LOG_LEVEL:INFO}
