# --- EUREKA ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: j-ledger/eureka-server:latest
          ports:
            - containerPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
spec:
  selector:
    app: eureka-server
  ports:
    - protocol: TCP
      port: 8761
      targetPort: 8761

# --- API GATEWAY ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: j-ledger/api-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: jledger-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

# --- CORE SERVICE ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-service
  template:
    metadata:
      labels:
        app: core-service
    spec:
      containers:
        - name: core-service
          image: j-ledger/core-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: jledger-config
          env:
            - name: JLEDGER_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                   name: jledger-secrets
                   key: DB_PASSWORD
            - name: JLEDGER_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: jledger-secrets
                  key: ADMIN_EMAIL
            - name: JLEDGER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jledger-secrets
                  key: ADMIN_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: core-service
spec:
  selector:
    app: core-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081

