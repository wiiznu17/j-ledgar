# --- ADMIN WEB ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-web
  template:
    metadata:
      labels:
        app: admin-web
    spec:
      containers:
        - name: admin-web
          image: j-ledger/admin-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: API_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: jledger-config
                  key: API_GATEWAY_URL
---
apiVersion: v1
kind: Service
metadata:
  name: admin-web
spec:
  selector:
    app: admin-web
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

# --- ADMIN API (BFF) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-api
  template:
    metadata:
      labels:
        app: admin-api
    spec:
      containers:
        - name: admin-api
          image: j-ledger/admin-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: jledger-config
                  key: ADMIN_API_DATABASE_URL
            - name: JLEDGER_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: jledger-secrets
                  key: JLEDGER_INTERNAL_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: admin-api
spec:
  selector:
    app: admin-api
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001

