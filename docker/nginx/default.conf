server {
    listen 80;
    server_name potayyr.site www.potayyr.site;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# SSL Configuration
server {
    listen 443 ssl;
    server_name potayyr.site www.potayyr.site;

    ssl_certificate /etc/letsencrypt/live/potayyr.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/potayyr.site/privkey.pem;

    # Recommendations from SSL Labs
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Backend API (BFF)
    location /api/ {
        proxy_pass http://admin-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js Admin Web
    location / {
        proxy_pass http://admin-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support for Next.js HMR/Websockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
