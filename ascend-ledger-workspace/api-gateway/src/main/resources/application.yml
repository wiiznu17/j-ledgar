server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: core-service-route
          uri: lb://j-ledger
          predicates:
            - Path=/api/v1/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
