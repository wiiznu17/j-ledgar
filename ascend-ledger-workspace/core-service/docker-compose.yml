version: '3.8'

services:
  # ----------------------------------------------------
  # 1. PostgreSQL - Primary Database
  # ----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: jledger-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ledger_admin
      POSTGRES_PASSWORD: ledger_password
      POSTGRES_DB: jledger_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_admin -d jledger_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 2. Redis - In-Memory Cache for Idempotency & Locking
  # ----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jledger-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_password
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 3. Zookeeper - Kafka Dependency
  # ----------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: jledger-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 4. Apache Kafka - Event Streaming
  # ----------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: jledger-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - jledger-network

# กำหนด Volume เพื่อไม่ให้ข้อมูลหายเมื่อปิด Container
volumes:
  pgdata:
  redisdata:

# สร้าง Network ให้ Service คุยกันเองได้
networks:
  jledger-network:
    driver: bridge
