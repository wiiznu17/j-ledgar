services:
  # ----------------------------------------------------
  # 1. PostgreSQL - Primary Database
  # ----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: jledger-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ledger_admin
      POSTGRES_PASSWORD: ledger_password
      POSTGRES_DB: jledger_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_admin -d jledger_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 2. Redis - In-Memory Cache
  # ----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jledger-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_password
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 3. Zookeeper
  # ----------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: jledger-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 4. Apache Kafka
  # ----------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: jledger-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 5. Eureka Server (Service Registry)
  # ----------------------------------------------------
  eureka-server:
    build:
      context: ./eureka-server
    image: j-ledger/eureka-server:latest
    container_name: jledger-eureka
    ports:
      - "8761:8761"
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 6. API Gateway
  # ----------------------------------------------------
  api-gateway:
    build:
      context: ./api-gateway
    image: j-ledger/api-gateway:latest
    container_name: jledger-gateway
    depends_on:
      - eureka-server
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 7. Core Service
  # ----------------------------------------------------
  core-service:
    build:
      context: ./core-service
    image: j-ledger/core-service:latest
    container_name: jledger-core
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      - JLEDGER_DATASOURCE_URL=jdbc:postgresql://postgres:5432/jledger_db
      - JLEDGER_DATASOURCE_USERNAME=ledger_admin
      - JLEDGER_DATASOURCE_PASSWORD=ledger_password
      - JLEDGER_REDIS_ADDRESS=redis://redis:6379
      - JLEDGER_REDIS_PASSWORD=redis_password
      # Use internal advertised plane for Docker Compose
      - JLEDGER_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 8. Notification Service
  # ----------------------------------------------------
  notification-service:
    build:
      context: ./notification-service
    image: j-ledger/notification-service:latest
    container_name: jledger-notification
    depends_on:
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      - JLEDGER_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 9. Next.js Admin Dashboard
  # ----------------------------------------------------
  admin-web:
    build:
      context: ./admin-web
    image: j-ledger/admin-web:latest
    container_name: jledger-admin-web
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
    networks:
      - jledger-network

volumes:
  pgdata:
  redisdata:

networks:
  jledger-network:
    driver: bridge
