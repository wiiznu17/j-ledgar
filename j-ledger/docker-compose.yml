version: '3.8'

services:
  # ----------------------------------------------------
  # 1. PostgreSQL - Primary Database
  # ----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: jledger-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ledger_admin
      POSTGRES_PASSWORD: ledger_password
      POSTGRES_DB: jledger_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_admin -d jledger_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jledger-network

  # ----------------------------------------------------
  # 2. Redis - In-Memory Cache for Idempotency & Locking
  # ----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jledger-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_password
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jledger-network

# กำหนด Volume เพื่อไม่ให้ข้อมูลหายเมื่อปิด Container
volumes:
  pgdata:
  redisdata:

# สร้าง Network ให้ Service คุยกันเองได้
networks:
  jledger-network:
    driver: bridge